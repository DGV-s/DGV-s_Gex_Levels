name: Update GEX levels

on:
  schedule:
    # Roda a cada 5 minutos, das 13h as 20h UTC, de segunda a sexta
    # (cobre o pregao regular da CME/CBOE em horario de verao dos EUA;
    # ajuste os numeros "13-20" se precisar cobrir mais cedo/mais tarde)
    - cron: '*/5 13-20 * * 1-5'
  workflow_dispatch:  # permite rodar manualmente pelo botao "Run workflow" na aba Actions

permissions:
  contents: write  # necessario para o robo poder commitar o JSON atualizado

jobs:
  update-gex-levels:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o codigo do repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests

      - name: Rodar o script de exportacao
        run: python export_json.py

      - name: Commitar o JSON atualizado (se mudou)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/gex_levels.json
          git diff --staged --quiet || git commit -m "Atualiza niveis de GEX [skip ci]"
          git push
